<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/style.css">
   <title>NIKE</title>
</head>
<body>
   <div class="card">
      <div class="card__box">
         <div class="card__wrapper">
            <img class="card__logo" src="img/logo.png" alt="">
            <div class="card__photo">
               <img class="card__img" src="img/shoose.png" alt="shoose">
            </div>
            <div class="card__scroll">
               <img src="img/ellipse1.png" alt="ellipse">
               <img src="img/ellipse2.png" alt="ellipse">
               <img src="img/ellipse3.png" alt="ellipse">
               <img src="img/ellipse4.png" alt="ellipse">
            </div>
            <div class="card__title">
               <div class="card__name">
                  <p>Nike SB Stefan Janoski Max</p>
               </div>
               <div class="card__sex">Unisex Skateboarding Shoe</div>
               <div class="card__rating">
                  <img src="img/star.png" alt="star">
                  <img src="img/star.png" alt="star">
                  <img src="img/star.png" alt="star">
                  <img src="img/star_empty.png" alt="star">
                  <img src="img/star_empty.png" alt="star">
               </div>
               <div class="card__properties">
                  <div class="card__size">Size</div>
                  <div class="card__quantity">Qty</div>
               </div>
               <div class="card__btn">
                  <a href="#">Add to cart</a>
               </div>
            </div>
         </div>
      </div>
   </div>
</body>
</html>
